backend:
  name: github
  repo: MaskDataEc/MonPortofolio
  branch: main
  # Remplace par l'URL de ton Worker Cloudflare une fois déployé (voir cms-oauth-worker/README.md)
  base_url: https://9f9b7d2c.cms-oauth-worker.pages.dev
  auth_endpoint: auth

media_folder: "assets/uploads" # Le dossier où iront les images uploadées
public_folder: "assets/uploads"

collections:
  - name: "portfolio"
    label: "Mon Portfolio"
    files:
      - file: "data/projects.json"
        label: "Mes Projets"
        name: "projects"
        fields:
          - name: "items"
            label: "Liste de mes projets"
            widget: "list"
            fields:
              - {label: "Titre du projet", name: "title", widget: "string"}
              - {label: "Catégorie", name: "category", widget: "select", options: ["data", "web", "sql"]}
              - {label: "Image", name: "image", widget: "image", required: false}
              - {label: "Description", name: "description", widget: "text"}
              - {label: "Technologies (Séparées par des virgules)", name: "tech", widget: "string", hint: "Ex: Python, Pandas, SQL"}
              - {label: "Lien GitHub", name: "githubLink", widget: "string", required: false}
              - {label: "Lien Démo", name: "demoLink", widget: "string", required: false}

  - name: "timeline"
    label: "Parcours & Certifications"
    files:
      - file: "data/certifications.json"
        label: "Mes Certifications"
        name: "certifications"
        fields:
          - name: "items"
            label: "Liste de mon parcours"
            widget: "list"
            fields:
              - {label: "Titre de la formation/certification", name: "title", widget: "string"}
              - {label: "Année (ex: 2023 ou En cours)", name: "year", widget: "string"}
              - {label: "Description", name: "description", widget: "text"}
              - {label: "Fichier de preuve (PDF ou Image)", name: "proofFile", widget: "file", required: false, hint: "Optionnel. Sera téléchargeable par le recruteur."}
